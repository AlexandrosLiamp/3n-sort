3cccccc%22%2F%3E%3Ccircle%20cx%3D%2254%22%20cy%3D%22102%22%20r%3D%227%22%20fill%3D%22%23dadada%22%2F%3E%3Ccircle%20cx%3D%2230%22%20cy%3D%22102%22%20r%3D%227%22%20fill%3D%22%23e8e8e8%22%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,700;1,300;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    /* ---- Surfaces ---------------------------------------------------- */
    --bg:        #0f131d;
    --bg2:       #11151f;
    --surface:   #12161f;
    --surface2:  #1a2030;
    --surface3:  #222a3d;
    --border:    rgba(255,255,255,0.06);
    --border2:   rgba(255,255,255,0.12);
    --border3:   rgba(255,255,255,0.20);

    /* ---- Text -------------------------------------------------------- */
    --text:   #eef0f6;
    --text2:  #c4cbda;
    --muted:  #8b93a9;
    --faint:  #5c6479;

    /* ---- Accents ----------------------------------------------------- */
    --accent:    #e7cd83;   /* gold — primary */
    --accent-dk: #d4b86a;
    --accent2:   #7aa6e6;   /* blue — block boundary */
    --accent3:   #84d3aa;   /* green — done */
    --red:       #ec8a8a;   /* dirty region */
    --orange:    #ff9a3c;
    --purple:    #b48ce6;   /* computing */

    /* ---- Type -------------------------------------------------------- */
    --mono:  'DM Mono', ui-monospace, monospace;
    --serif: 'Fraunces', Georgia, serif;

    /* ---- Misc -------------------------------------------------------- */
    --radius:   14px;
    --radius-s: 8px;
    --shadow:   0 1px 0 rgba(255,255,255,0.04) inset,
                0 18px 50px -20px rgba(0,0,0,0.8),
                0 6px 18px -10px rgba(0,0,0,0.6);
    --ring:     0 0 0 3px rgba(231,205,131,0.22);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    -webkit-tap-highlight-color: transparent;
  }

  /* Layered backdrop: grid texture + warm/cool glows */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
    background-size: 38px 38px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse 120% 80% at 50% 0%, #000 35%, transparent 100%);
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(60% 45% at 50% -8%, rgba(231,205,131,0.10), transparent 60%),
      radial-gradient(55% 40% at 88% 8%, rgba(122,166,230,0.08), transparent 65%);
  }

  /* ===================  HERO  =================== */
  .hero {
    position: relative;
    z-index: 1;
    max-width: 920px;
    margin: 0 auto;
    padding: 72px 28px 44px;
    border-bottom: 1px solid var(--border);
  }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 22px;
  }

  .hero-eyebrow::before {
    content: '';
    width: 26px;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .hero-mark {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }

  .hero-logo {
    width: 76px;
    height: 76px;
    flex-shrink: 0;
    filter: drop-shadow(0 6px 22px rgba(231,205,131,0.18));
  }

  .hero h1 {
    font-family: var(--serif);
    font-size: clamp(44px, 7.5vw, 76px);
    font-weight: 700;
    line-height: 0.98;
    letter-spacing: -0.015em;
    color: var(--text);
  }

  .hero h1 em {
    font-style: italic;
    font-weight: 300;
    color: var(--accent);
  }

  @supports ((-webkit-background-clip: text) or (background-clip: text)) {
    .hero h1 em {
      background: linear-gradient(120deg, var(--accent), #f2dca0);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  }

  .hero-sub {
    font-size: 14.5px;
    line-height: 1.85;
    color: var(--text2);
    max-width: 580px;
  }

  /* ===================  CONTENT / CARD  =================== */
  .content {
    position: relative;
    z-index: 1;
    max-width: 920px;
    margin: 0 auto;
    padding: 36px 28px 96px;
  }

  .demo-card {
    background: linear-gradient(180deg, var(--surface), var(--bg2));
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .demo-header {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    gap: 14px;
    background: rgba(255,255,255,0.014);
  }

  .control-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: nowrap;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border3) transparent;
  }

  .control-row::-webkit-scrollbar { height: 6px; }
  .control-row::-webkit-scrollbar-thumb { background: var(--border3); border-radius: 3px; }

  .control-row > * { flex-shrink: 0; }

  .ctl-label {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text2);
    margin-right: 2px;
  }

  /* segmented preset-size group */
  .seg {
    display: inline-flex;
    padding: 3px;
    gap: 2px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-s);
  }

  .seg .size-btn, .seg .mode-btn {
    border: none;
    background: transparent;
    border-radius: 6px;
    padding: 5px 11px;
  }

  .seg .size-btn:hover, .seg .mode-btn:hover { background: rgba(255,255,255,0.05); }

  .spacer { flex: 1 1 auto; min-width: 4px; }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 7px 13px;
    border-radius: var(--radius-s);
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    letter-spacing: 0.06em;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.05s;
  }

  .btn:hover { background: var(--surface3); border-color: var(--border3); }
  .btn:active { transform: translateY(1px); }
  .btn:focus-visible { outline: none; box-shadow: var(--ring); }

  .btn.ghost { background: transparent; }
  .btn.ghost:hover { background: var(--surface2); }

  .btn.primary {
    background: linear-gradient(180deg, var(--accent), var(--accent-dk));
    color: #14110a;
    border-color: var(--accent-dk);
    font-weight: 500;
    box-shadow: 0 6px 16px -8px rgba(231,205,131,0.6);
  }

  .btn.primary:hover { filter: brightness(1.05); border-color: var(--accent); }
  .btn:disabled { opacity: 0.34; cursor: not-allowed; transform: none; }

  .size-btn.active, .mode-btn.active {
    background: rgba(231,205,131,0.16);
    color: var(--accent);
    box-shadow: inset 0 0 0 1px rgba(231,205,131,0.45);
  }


  input[type="number"] {
    font-family: var(--mono);
    font-size: 11px;
    padding: 7px 10px;
    border-radius: var(--radius-s);
    border: 1px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    outline: none;
    width: 62px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input[type="number"]:focus { border-color: var(--accent); box-shadow: var(--ring); }

  /* custom-size input sitting inside the size segment */
  .seg input[type="number"] {
    border: none;
    border-left: 1px solid var(--border2);
    background: transparent;
    border-radius: 0 6px 6px 0;
    padding: 5px 4px;
    width: 48px;
    margin-left: 2px;
    text-align: center;
    transition: background 0.15s, box-shadow 0.15s;
    -moz-appearance: textfield;
    appearance: textfield;
  }

  .seg input[type="number"]::-webkit-outer-spin-button,
  .seg input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .seg input[type="number"].active {
    background: rgba(231,205,131,0.16);
    color: var(--accent);
    box-shadow: inset 0 0 0 1px rgba(231,205,131,0.45);
  }

  /* ===================  GRID CANVAS  =================== */
  .grid-wrap {
    padding: 24px 20px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    background:
      radial-gradient(80% 80% at 50% 40%, rgba(255,255,255,0.018), transparent 70%);
  }

  #grid-canvas {
    display: block;
    margin: 0 auto;
    cursor: zoom-in;
    border-radius: 6px;
    box-shadow: 0 0 0 1px var(--border2), 0 20px 50px -24px rgba(0,0,0,0.9);
  }

  /* ===================  LANGUAGE SWITCHER  =================== */
  .topbar {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 20;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .topbtn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 8px 13px;
    border-radius: 11px;
    border: 1px solid var(--border2);
    background: rgba(16,20,29,0.88);
    backdrop-filter: blur(10px);
    color: var(--muted);
    cursor: pointer;
    box-shadow: 0 10px 28px -14px rgba(0,0,0,0.8);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .topbtn:hover { background: var(--surface2); color: var(--text); border-color: var(--border3); }

  .lang-switch {
    display: inline-flex;
    gap: 3px;
    padding: 4px;
    border-radius: 11px;
    border: 1px solid var(--border2);
    background: rgba(16,20,29,0.88);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 28px -14px rgba(0,0,0,0.8);
  }

  .lang-opt {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 6px 11px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .lang-opt:hover { background: var(--surface2); color: var(--text); }
  .lang-opt:focus-visible { outline: none; box-shadow: var(--ring); }

  .lang-opt.active {
    background: rgba(231,205,131,0.16);
    color: var(--accent);
    box-shadow: inset 0 0 0 1px rgba(231,205,131,0.45);
  }

  .lang-opt .flag {
    width: 19px;
    height: 13px;
    border-radius: 2px;
    display: block;
    flex-shrink: 0;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.16);
  }

  /* ===================  PHASE PANEL  =================== */
  .phase-panel {
    display: flex;
    align-items: flex-start;
    gap: 18px;
    padding: 20px;
    border-bottom: 1px solid var(--border);
    min-height: 92px;
  }

  .phase-badge {
    flex-shrink: 0;
    width: 50px;
    height: 50px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 22px;
    font-style: italic;
    font-weight: 700;
    color: var(--muted);
    transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
  }

  .phase-badge.active {
    background: rgba(231,205,131,0.14);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 22px -6px rgba(231,205,131,0.4);
  }

  .phase-badge.done {
    background: rgba(132,211,170,0.14);
    border-color: var(--accent3);
    color: var(--accent3);
  }

  .phase-badge.computing {
    background: rgba(180,140,230,0.14);
    border-color: var(--purple);
    color: var(--purple);
    animation: pulse 1.1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1;   box-shadow: 0 0 0 0 rgba(180,140,230,0.0); }
    50%      { opacity: 0.55; box-shadow: 0 0 26px -4px rgba(180,140,230,0.5); }
  }

  .phase-info { flex: 1; min-width: 0; }

  .phase-title-text {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .phase-desc-text {
    font-size: 13.5px;
    line-height: 1.78;
    color: var(--text2);
  }

  /* progress track (was vertical dots) */
  .phase-dots-col {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding-top: 4px;
    flex-shrink: 0;
  }

  .phase-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--border2);
    transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
  }

  .phase-dot.done    { background: var(--accent3); }
  .phase-dot.current {
    background: var(--accent);
    transform: scale(1.35);
    box-shadow: 0 0 10px -1px rgba(231,205,131,0.7);
  }

  /* ===================  PHASE STEPPER (jump row)  =================== */
  .phase-jump-row {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-wrap: nowrap;
  }

  .phase-btn {
    font-family: var(--mono);
    font-size: 10px;
    width: 28px;
    height: 28px;
    border-radius: 7px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.05s;
  }

  .phase-btn:hover {
    background: var(--surface3);
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .phase-btn:active { transform: translateY(1px); }
  .phase-btn:focus-visible { outline: none; box-shadow: var(--ring); }

  .phase-btn.active {
    background: rgba(231,205,131,0.16);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: inset 0 0 0 1px rgba(231,205,131,0.4);
  }

  .phase-btn.done {
    background: rgba(132,211,170,0.13);
    border-color: var(--accent3);
    color: var(--accent3);
  }

  .phase-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  /* ===================  LEGEND  =================== */
  .legend {
    display: flex;
    gap: 10px;
    padding: 14px 20px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 10px;
    letter-spacing: 0.04em;
    color: var(--muted);
    padding: 5px 10px;
    border-radius: 999px;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

  /* ===================  GRID MODAL (lightbox)  =================== */
  .grid-modal {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: none;
    overflow: auto;
    background: rgba(5,7,11,0.93);
    backdrop-filter: blur(4px);
  }

  .grid-modal.open { display: flex; }

  #modal-canvas {
    margin: auto;
    image-rendering: pixelated;
    box-shadow: 0 10px 60px rgba(0,0,0,0.7);
    border-radius: 6px;
    cursor: zoom-out;
  }

  .grid-modal-close {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 51;
    width: 42px;
    height: 42px;
    font-size: 22px;
    line-height: 1;
    border-radius: 10px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .grid-modal-close:hover { background: var(--surface2); border-color: var(--border3); }

  .grid-modal-hint {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 51;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    pointer-events: none;
  }

  .modal-phase {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 51; display: flex; align-items: center; gap: 10px;
    max-width: 80vw; padding: 7px 13px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border2);
    font-size: 13px; color: var(--text);
  }
  .modal-phase .mp-badge {
    width: 26px; height: 26px; flex: none; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 600;
    background: var(--surface2); border: 1px solid var(--border2);
  }
  .modal-phase .mp-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .modal-controls {
    position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
    z-index: 51; display: flex; gap: 8px;
  }
  .modal-controls .mbtn {
    min-width: 46px; height: 40px; padding: 0 12px;
    font-size: 16px; line-height: 1; border-radius: 10px;
    border: 1px solid var(--border2); background: var(--surface);
    color: var(--text); cursor: pointer;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s;
  }
  .modal-controls .mbtn:hover:not(:disabled) { background: var(--surface2); border-color: var(--border3); }
  .modal-controls .mbtn:disabled { opacity: 0.4; cursor: default; }

  .tooltip {
    position: fixed; z-index: 100; display: none;
    max-width: 240px; padding: 7px 10px;
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border3); border-radius: 8px;
    font-size: 12px; line-height: 1.35;
    box-shadow: 0 6px 24px rgba(0,0,0,0.5);
    pointer-events: none;
  }

  /* Tooltip wrapper — lets a hover tip show even when the inner button is
     disabled (disabled buttons don't fire mouse events, so the wrapper does). */
  .tipwrap { display: inline-flex; }
  .tipwrap > button:disabled { pointer-events: none; }

  /* ===================  GUIDED TOUR  =================== */
  #tour-mask { position: fixed; inset: 0; z-index: 1000; display: none; }
  #tour-mask.on { display: block; }
  #tour-spotlight {
    position: fixed; z-index: 1001; display: none;
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(6,8,12,0.80);
    pointer-events: none;
    transition: left .25s ease, top .25s ease, width .25s ease, height .25s ease;
  }
  #tour-popover {
    position: fixed; z-index: 1002; display: none;
    width: 300px; max-width: calc(100vw - 24px);
    padding: 16px 18px 14px;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border3); border-radius: 12px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.65);
    transition: left .25s ease, top .25s ease;
  }
  #tour-text { font-size: 13.5px; line-height: 1.5; }
  #tour-controls { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
  #tour-step { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-right: auto; letter-spacing: 0.06em; }
  .tour-btn {
    font-family: var(--mono); font-size: 11px; padding: 7px 12px;
    border-radius: 8px; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text); cursor: pointer;
    transition: background .15s, border-color .15s, opacity .15s;
  }
  .tour-btn:hover:not(:disabled) { background: var(--surface3); border-color: var(--border3); }
  .tour-btn:disabled { opacity: 0.4; cursor: default; }
  .tour-btn.primary { background: linear-gradient(180deg, var(--accent), var(--accent-dk)); color: #14110a; border-color: var(--accent-dk); }
  .tour-x {
    position: absolute; top: 8px; right: 10px;
    width: 26px; height: 26px; line-height: 1; font-size: 18px;
    border: none; background: transparent; color: var(--muted);
    cursor: pointer; border-radius: 7px;
  }
  .tour-x:hover { background: var(--surface2); color: var(--text); }

  /* ===================  DRAW TOOLBAR  =================== */
  .draw-toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(180,140,230,0.05);
  }

  .draw-toolbar input[type="range"] {
    width: 130px;
    cursor: pointer;
    accent-color: var(--accent);
  }

  /* ===================  RESPONSIVE  =================== */
  @media (max-width: 760px) {
    .hero { padding: 56px 20px 36px; }
    .content { padding: 28px 16px 80px; }
    .hero-mark { gap: 14px; }
    .hero-logo { width: 60px; height: 60px; }
    .demo-header { padding: 14px 14px; }
    .grid-wrap { padding: 18px 12px; }
    .phase-panel { padding: 16px 14px; gap: 14px; }
    .legend { padding: 12px 14px; }

    /* let control rows wrap instead of scroll on small screens */
    .control-row { flex-wrap: wrap; overflow-x: visible; }
    /* full-width line so the 0–8 buttons wrap instead of overflowing offscreen
       (overrides the global .control-row > * flex-shrink:0) */
    .phase-jump-row { flex-wrap: wrap; flex: 1 1 100%; }
    .spacer { display: none; }
  }

  @media (max-width: 480px) {
    .hero { padding: 48px 16px 32px; }
    .hero-eyebrow { font-size: 10px; letter-spacing: 0.18em; margin-bottom: 16px; }
    .hero-sub { font-size: 12.5px; }
    .phase-badge { width: 44px; height: 44px; font-size: 19px; }
    .phase-title-text, .phase-desc-text { font-size: 12px; }
    .topbar { top: 12px; right: 12px; gap: 8px; }
    .lang-switch { padding: 3px; }
    .lang-opt { padding: 5px 9px; gap: 6px; }
    .btn { padding: 7px 11px; }
  }

  /* Larger tap targets on touch devices (phones + tablets, any width) */
  @media (pointer: coarse) {
    .btn { padding: 9px 14px; }
    .phase-btn { width: 34px; height: 34px; font-size: 11px; }
    .seg .size-btn { padding: 7px 13px; }
    .lang-opt { padding: 7px 11px; }
    .draw-toolbar input[type="range"] { height: 24px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>

<script>
// ---------------------------------------------------------------------------
// Constants
// ---------------------------------------------------------------------------
const VALID_SIZES = [16, 81, 256];

const PHASES = [

// ---------------------------------------------------------------------------

// LANG persists in localStorage; applyLang() fills every [data-i18n] element.
// ---------------------------------------------------------------------------
const STRINGS = {
  el: {

    heroSub:        'Παράλληλος αλγόριθμος ταξινόμησης για πλέγμα n×n επεξεργαστών.',
    gridSize:       'Μέγεθος:',
    frameLabel:     'Τιμές:',

    btnPlayAll:     '▶▶',
    btnPrev:        'Πίσω',
    btnPause:       '⏸',
    btnResume:      '▶',
    legendBlock:    'Όριο block',
    legendDirty:    'Βρώμικη Περιοχή',

// ---------------------------------------------------------------------------
// Worker pool — one SharedArrayBuffer, N_WORKERS threads
// ---------------------------------------------------------------------------
const MAX_N      = 256;
const N_WORKERS  = Math.min(navigator.hardwareConcurrency || 4, 16);
const sab        = new SharedArrayBuffer(MAX_N * MAX_N);  // shared grid memory
const sharedGrid = new Uint8Array(sab);

let   workerPool = [];
let   msgSeq     = 0;
const pending    = new Map(); // id → resolve(swapCount)

async function initWorkerPool() {
  const readyPromises = [];
  for (let i = 0; i < N_WORKERS; i++) {
    const w = new Worker('./sort-worker.js');

    // Permanent handler for 'done' responses
    w.addEventListener('message', e => {
      if (e.data.type === 'done') {
        const cb = pending.get(e.data.id);
        if (cb) { cb(e.data.swaps); pending.delete(e.data.id); }
      }
    });

    workerPool.push(w);

    // One-shot handler to await 'ready' after init
    readyPromises.push(new Promise(resolve => {
      w.addEventListener('message', function onReady(e) {
        if (e.data.type === 'ready') {
          w.removeEventListener('message', onReady);
          resolve();
        }
      });
      w.postMessage({ type: 'init', buffer: sab });
    }));
  }
  await Promise.all(readyPromises);
}

// Send a flat Int32Array of pair indices to the pool — all workers fire in parallel.
// Returns total swap count across all workers.
async function dispatchPairs(flat) {
  const nPairs = flat.length >> 1;
  if (!nPairs) return 0;

  const nW     = Math.min(workerPool.length, nPairs);
  const pPerW  = Math.ceil(nPairs / nW);
  const proms  = [];

  for (let w = 0; w < nW; w++) {
    const s = w * pPerW * 2;
    const e = Math.min(s + pPerW * 2, flat.length);
    if (s >= flat.length) break;

    const chunk = flat.slice(s, e); // own buffer — safe to transfer
    const id    = msgSeq++;
    proms.push(new Promise(res => { pending.set(id, res); }));
    workerPool[w].postMessage({ type: 'swap_pairs', pairsBuf: chunk.buffer, id }, [chunk.buffer]);
  }

  const counts = await Promise.all(proms);
  return counts.reduce((a, b) => a + b, 0);
}

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
function nextValidN(n)    { return VALID_SIZES.find(v => v >= n) || 256; }
function isPaddingNeeded(){ return nextValidN(logicalN) !== logicalN; }

function getPhaseOrder() {
  return isPaddingNeeded()
    ? ['PAD', 1, 2, 3, 4, 5, 6, 7, 8, 'UNPAD']
    : [1, 2, 3, 4, 5, 6, 7, 8];
}

function phaseIndex(ph) { return getPhaseOrder().indexOf(ph); }

function getBlockSize(n) { return Math.round(Math.pow(n, 0.75)); }
function getNumBlocks(n) { return Math.round(n / getBlockSize(n)); }
function getNumSlices(n) { return Math.round(Math.pow(n, 0.25)); }

function getSnakeIndices(r0, c0, r1, c1) {
  const idx = [];
  for (let r = r0; r <= r1; r++) {
    const fwd = (r - r0) % 2 === 0;
    for (let ci = 0; ci <= c1 - c0; ci++)
      idx.push([r, fwd ? c0 + ci : c1 - ci]);
  }
  return idx;
}

// ---------------------------------------------------------------------------
// Parallel odd-even transposition — async, all pairs fire simultaneously.
// Collects every pair across all regions into one flat Int32Array per pass,
// splits evenly across N_WORKERS workers, awaits all before the next pass.
// Early exit: 2 consecutive no-swap passes = sorted.
// ---------------------------------------------------------------------------
async function parallelOddEven(g, n, regions) {
  if (!regions.length) return;
  const maxLen = Math.max(...regions.map(r => r.length));
  let noSwap = 0;

  for (let t = 0; t < maxLen && noSwap < 2; t++) {
    const start = t % 2;
    const buf   = []; // will become Int32Array

    for (const idx of regions)
      for (let j = start; j + 1 < idx.length; j += 2)
        buf.push(idx[j][0] * n + idx[j][1],
                 idx[j+1][0] * n + idx[j+1][1]);

    if (!buf.length) { noSwap++; continue; }

    const swaps = await dispatchPairs(new Int32Array(buf));
    noSwap = swaps > 0 ? 0 : noSwap + 1;
  }
}

// ---------------------------------------------------------------------------
// Region definitions for each odd-even sorting phase — single source of truth,
// shared by runPhases (parallel execution) and the Play feature (frame capture).
// Returns an array of index-paths (each a list of [r,c]); null for non-sort
// stages (phase 2 is a permutation, PAD/UNPAD are structural).
// ---------------------------------------------------------------------------
function phaseRegions(phase, n) {
  const bs = getBlockSize(n);
  const nb = getNumBlocks(n);
  const k  = getNumSlices(n);
  const sw = Math.floor(n / k);

  if (phase === 1 || phase === 3) {           // every block's snake
    const r = [];
    for (let br = 0; br < nb; br++)
      for (let bc = 0; bc < nb; bc++)
        r.push(getSnakeIndices(br*bs, bc*bs, (br+1)*bs-1, (bc+1)*bs-1));
    return r;
  }
  if (phase === 4) {                          // every column
    const cols = [];
    for (let c = 0; c < n; c++) {
      const idx = [];
      for (let r = 0; r < n; r++) idx.push([r, c]);
      cols.push(idx);
    }
    return cols;
  }
  if (phase === 5 || phase === 6) {           // block pairs per vertical slice
    const regs = [];
    const p0   = (phase === 5) ? 0 : 1;       // 5: 1+2,3+4…   6: 2+3,4+5…
    for (let vs = 0; vs < k; vs++) {
      const c0 = vs * sw, c1 = c0 + sw - 1;
      for (let p = p0; p + 1 < nb; p += 2)
        regs.push(getSnakeIndices(p*bs, c0, Math.min((p+2)*bs-1, n-1), c1));
    }
    return regs;
  }
  if (phase === 7) {                          // every row, snake direction
    const rows = [];
    for (let r = 0; r < n; r++) {
      const idx = [];
      if (r % 2 === 0) for (let c = 0; c < n; c++) idx.push([r, c]);
      else             for (let c = n-1; c >= 0; c--) idx.push([r, c]);
      rows.push(idx);
    }
    return rows;
  }
  if (phase === 8) return [getSnakeIndices(0, 0, n-1, n-1)]; // full snake
  return null;                                // phase 2 / PAD / UNPAD
}

// ---------------------------------------------------------------------------
// Run all 8 phases on g (Uint8Array view of SAB), async.
// push(phaseNum) is called after each phase to snapshot the state.
// ---------------------------------------------------------------------------
async function runPhases(g, n, push) {
  const k  = getNumSlices(n);
  const sw = Math.floor(n / k);

  await parallelOddEven(g, n, phaseRegions(1, n));
  push(1);

  // Phase 2 — pure column permutation, no compare-swap, stays on main thread
  {
    const h = g.slice(0, n * n);
    for (let r = 0; r < n; r++)
      for (let c = 0; c < n; c++) {
        const nc = (c % k) * sw + Math.floor(c / k);
        h[r * n + nc] = g[r * n + c];
      }
    g.set(h, 0);
  }
  push(2);

  await parallelOddEven(g, n, phaseRegions(3, n));
  push(3);

  await parallelOddEven(g, n, phaseRegions(4, n));
  push(4);

  { const regs = phaseRegions(5, n); if (regs.length) await parallelOddEven(g, n, regs); }
  push(5);

  { const regs = phaseRegions(6, n); if (regs.length) await parallelOddEven(g, n, regs); }
  push(6);

  await parallelOddEven(g, n, phaseRegions(7, n));
  push(7);

  await parallelOddEven(g, n, phaseRegions(8, n));
  push(8);
}

// ---------------------------------------------------------------------------
// Build all ops — async; uses sharedGrid (SAB-backed) as working array.
// ---------------------------------------------------------------------------
// ---------------------------------------------------------------------------
// Slice-provenance labels — which ORIGINAL vertical slice each cell came from,
// tracked through every phase so the colours flow with the data (not just 1–2).
// Odd-even transposition on 0-1 data is STABLE (equal elements never swap), so a
// phase's end labels = each region path's 0-cell labels then its 1-cell labels,
// in original order — no pass simulation needed for the cached phase snapshots.
// ---------------------------------------------------------------------------
function initSliceLabels(n) {
  const k = getNumSlices(n), sw = Math.floor(n / k);
  const lab = new Uint8Array(n * n);
  for (let r = 0; r < n; r++)
    for (let c = 0; c < n; c++)
      lab[r * n + c] = Math.floor(c / sw);
  return lab;
}
function permuteSliceLabels(lab, n) {            // mirrors the Phase 2 column unshuffle
  const k = getNumSlices(n), sw = Math.floor(n / k);
  const out = new Uint8Array(n * n);
  for (let r = 0; r < n; r++)
    for (let c = 0; c < n; c++) {
      const nc = (c % k) * sw + Math.floor(c / k);
      out[r * n + nc] = lab[r * n + c];
    }
  return out;
}
function partitionSliceLabels(lab, val, n, phase) {   // stable sort of labels along each region path
  const regions = phaseRegions(phase, n);
  if (!regions) return lab.slice();
  const out = lab.slice();
  for (const path of regions) {
    let i = 0;
    for (const [r, c] of path) if (val[r * n + c] === 0) { const [pr, pc] = path[i++]; out[pr * n + pc] = lab[r * n + c]; }
    for (const [r, c] of path) if (val[r * n + c] === 1) { const [pr, pc] = path[i++]; out[pr * n + pc] = lab[r * n + c]; }
  }
  return out;
}

async function buildAllOps() {
  const paddedN  = nextValidN(logicalN);
  const needsPad = paddedN !== logicalN;
  const list     = [];
  const g        = sharedGrid; // Uint8Array view of SAB
  let   workN;

  if (needsPad) {
    workN = paddedN;
    g.fill(1, 0, paddedN * paddedN);          // pad cells start as 1 (max value)
    for (let r = 0; r < logicalN; r++)        // original stays intact in the top-left;
      for (let c = 0; c < logicalN; c++)      // extra right columns + bottom rows remain 1
        g[r * paddedN + c] = logicalGrid[r * logicalN + c];
    list.push({ phaseNum: 'PAD', displayN: paddedN, gridSnapshot: g.slice(0, paddedN * paddedN) });
  } else {
    workN = logicalN;
    g.set(logicalGrid, 0);
  }

  await runPhases(g, workN, ph => {
    list.push({ phaseNum: ph, displayN: workN, gridSnapshot: g.slice(0, workN * workN) });
  });

  if (needsPad) {
    const ps  = getSnakeIndices(0, 0, paddedN  - 1, paddedN  - 1);
    const ls  = getSnakeIndices(0, 0, logicalN - 1, logicalN - 1);
    const out = new Uint8Array(logicalN * logicalN);
    ps.slice(0, logicalN * logicalN).forEach(([r, c], i) => {
      const [lr, lc] = ls[i];
      out[lr * logicalN + lc] = g[r * paddedN + c];
    });
    list.push({ phaseNum: 'UNPAD', displayN: logicalN, gridSnapshot: out });
  }

  // Slice-provenance label snapshot for every op (stable-partition; see initSliceLabels).
  {
    let lab = initSliceLabels(workN);
    let val = needsPad ? list[0].gridSnapshot : new Uint8Array(logicalGrid);   // values at phase-1 start
    for (const op of list) {
      if (op.phaseNum === 'PAD') {
        op.labelSnapshot = lab.slice();
      } else if (op.phaseNum === 'UNPAD') {
        const ps = getSnakeIndices(0, 0, paddedN  - 1, paddedN  - 1);
        const ls = getSnakeIndices(0, 0, logicalN - 1, logicalN - 1);
        const ul = new Uint8Array(logicalN * logicalN);
        ps.slice(0, logicalN * logicalN).forEach(([r, c], i) => { const [lr, lc] = ls[i]; ul[lr * logicalN + lc] = lab[r * paddedN + c]; });
        op.labelSnapshot = ul;
      } else if (op.phaseNum === 2) {
        lab = permuteSliceLabels(lab, workN);
        op.labelSnapshot = lab.slice();
        val = op.gridSnapshot;
      } else {                                   // sorting phases 1,3,4,5,6,7,8
        lab = partitionSliceLabels(lab, val, workN, op.phaseNum);
        op.labelSnapshot = lab.slice();
        val = op.gridSnapshot;
      }
    }
  }

  list.push({ type: 'done' });
  return list;
}

  document.getElementById('grid-size').value = logicalN;

  N               = logicalN;

  logicalGrid = Array.from({ length: logicalN * logicalN }, () => Math.random() < 0.5 ? 0 : 1);
  grid        = new Uint8Array(logicalGrid);
  gridSource  = 'random';

  await computeOps();
}

  cancelPlayback();
  computing = true;
  setEditingDisabled(true);
  updateControls();
  currentLabels = null;   // phase 0 (initial grid) is not slice-coloured

  const badge = document.getElementById('phase-badge');
  badge.className   = 'phase-badge computing';
  badge.textContent = '⋯';
  document.getElementById('phase-title-text').textContent = t('computingTitle');
  document.getElementById('phase-desc-text').textContent  = t('computingDesc');

  drawGrid();

  ops   = await buildAllOps();
  opIdx = 0;

  computing = false;
  setEditingDisabled(false);

  updateUI();
  updatePhaseButtons();
  drawGrid();
}

  cb.textContent     = drawColor === 1 ? t('colorWhite') : t('colorBlack');
  cb.style.background = drawColor === 1 ? '#e8eaf0' : '#0b0e14';
  cb.style.color      = drawColor === 1 ? '#0b0e14' : '#e8eaf0';
}

function startDraw() {
  drawMode = true;
  logicalN = Math.max(16, Math.min(256, parseInt(document.getElementById('grid-size').value) || 16));
  document.getElementById('grid-size').value = logicalN;
  N               = logicalN;
  currentPhaseNum = 0;
  grid            = new Uint8Array(logicalN * logicalN); // blank (all black)
  currentLabels   = null;

  document.getElementById('draw-toolbar').style.display = '';
  canvas.style.cursor = 'crosshair';
  canvas.style.touchAction = 'none';   // finger-drag paints instead of scrolling
  document.getElementById('btn-draw').disabled = true;
  document.querySelectorAll('.phase-btn').forEach(b => b.disabled = true);
  updateControls();   // drawMode → play/nav bar disabled

  const badge = document.getElementById('phase-badge');
  badge.className   = 'phase-badge';
  badge.textContent = '✎';
  document.getElementById('phase-title-text').textContent = t('drawTitle');
  document.getElementById('phase-desc-text').textContent  = t('drawHint');

  refreshDrawLabels();
  updateSizeButtons();
  updateModeButtons();
  drawGrid();
}

async function finishDraw() {
  drawMode = false;
  document.getElementById('draw-toolbar').style.display = 'none';
  canvas.style.cursor = '';
  canvas.style.touchAction = '';
  refreshDrawLabels();

  logicalGrid     = Array.from(grid); // commit the painting
  gridSource      = 'draw';
  currentPhaseNum = 0;
  await computeOps();
}

function exitDrawMode() {
  if (!drawMode) return;
  drawMode = false;
  document.getElementById('draw-toolbar').style.display = 'none';
  document.getElementById('btn-draw').disabled = false;
  canvas.style.cursor = '';
  canvas.style.touchAction = '';
  refreshDrawLabels();
}

function paintAt(e) {
  const rect = canvas.getBoundingClientRect();
  const cw   = rect.width  / N;
  const ch   = rect.height / N;
  const cx   = Math.floor((e.clientX - rect.left) / cw);
  const cy   = Math.floor((e.clientY - rect.top)  / ch);
  const r    = Math.floor(brushSize / 2);

  // Incremental render: paint only the brush cells directly (O(brush²)) instead
  // of redrawing the whole N×N grid each mousemove — avoids cursor lag at n=256.
  // Block boundaries are restored by a full drawGrid() on mouseup.
  const cell = Math.max(1, Math.floor(Math.min(560, window.innerWidth - 48) / N));
  const dpr  = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = drawColor === 1 ? '#e8eaf0' : '#0b0e14';
  for (let dy = -r; dy <= r; dy++)
    for (let dx = -r; dx <= r; dx++) {
      const x = cx + dx, y = cy + dy;
      if (x < 0 || x >= N || y < 0 || y >= N) continue;
      grid[y * N + x] = drawColor;
      ctx.fillRect(x * cell, y * cell, cell, cell);
    }
}

// ---------------------------------------------------------------------------
// Step forward — synchronous; reads from pre-computed snapshot cache.
// ---------------------------------------------------------------------------
function stepForward() {
  if (opIdx >= ops.length) return;
  const op = ops[opIdx++];

  if (op.type === 'done') {
    document.getElementById('btn-step').disabled = true;
    updateUI(); updatePhaseButtons(); drawGrid();
    return;
  }

  N               = op.displayN;
  grid            = op.gridSnapshot.slice();
  currentLabels   = op.labelSnapshot;
  currentPhaseNum = op.phaseNum;

  if (opIdx >= ops.length || ops[opIdx].type === 'done')
    document.getElementById('btn-step').disabled = true;

  if (!suppressDraw) { updateUI(); updatePhaseButtons(); drawGrid(); }
}

// ---------------------------------------------------------------------------
// Jump to phase — synchronous; reuses cached ops, no recomputation.
// ---------------------------------------------------------------------------
function jumpToPhase(targetPhase) {
  opIdx           = 0;
  N               = logicalN;
  grid            = new Uint8Array(logicalGrid);
  currentLabels   = null;
  currentPhaseNum = 0;
  document.getElementById('btn-step').disabled = false;

  if (targetPhase === 0) { updateUI(); updatePhaseButtons(); drawGrid(); return; }

  suppressDraw = true;
  while (opIdx < ops.length) {
    const op = ops[opIdx];
    if (op.type === 'done') break;
    if (op.phaseNum === targetPhase) { suppressDraw = false; stepForward(); return; }
    stepForward();
  }
  suppressDraw = false;
  updateUI(); updatePhaseButtons(); drawGrid();
}

// ---------------------------------------------------------------------------
// Real-time Play — animate the CURRENT phase sorting over a fixed PLAY_MS (5s),
// regardless of grid size. Press Play → reset to the unsorted state of this
// stage (end of the previous phase) → animate each compare-swap pass → settle
// on the phase end.
// ---------------------------------------------------------------------------

// Serial odd-even transposition — a faithful replay of parallelOddEven's pass
// order and 2-no-swap early exit. Swaps the slice-label array (lab) alongside the
// value array (g) so colours animate with the data. onPass() fires after each pass.
function oddEvenCaptureLabeled(g, lab, n, regions, onPass) {
  if (!regions || !regions.length) return;
  const maxLen = Math.max(...regions.map(r => r.length));
  let noSwap = 0;
  for (let t = 0; t < maxLen && noSwap < 2; t++) {
    const start = t % 2;
    let swaps = 0;
    for (const idx of regions)
      for (let j = start; j + 1 < idx.length; j += 2) {
        const a = idx[j][0] * n + idx[j][1];
        const b = idx[j+1][0] * n + idx[j+1][1];
        if (g[a] > g[b]) {
          const tv = g[a];   g[a]   = g[b];   g[b]   = tv;
          const tl = lab[a]; lab[a] = lab[b]; lab[b] = tl;
          swaps++;
        }
      }
    noSwap = swaps > 0 ? 0 : noSwap + 1;
    onPass();
  }
}

// Capture intermediate frames of one sorting phase. `start` is the n×n end state
// of the previous phase. Returns Uint8Array snapshots: [0]=start … [last]=end.
// Bounded to ~MAX_FRAMES by progressive decimation, so memory stays small even
// at n=256 where a block sort can run thousands of passes.
function capturePhaseFrames(start, startLab, n, phase) {
  const regions = phaseRegions(phase, n);
  const g    = start.slice();
  const lab  = startLab.slice();
  const vF   = [g.slice()];               // frame 0 = unsorted (previous phase end)
  const lF   = [lab.slice()];
  let stride = 1, since = 0;

  oddEvenCaptureLabeled(g, lab, n, regions, () => {
    if (++since >= stride) { vF.push(g.slice()); lF.push(lab.slice()); since = 0; }
    if (vF.length >= MAX_FRAMES * 2) {               // halve: keep even indices
      let w = 0;
      for (let i = 0; i < vF.length; i += 2) { vF[w] = vF[i]; lF[w] = lF[i]; w++; }
      vF.length = w; lF.length = w;
      stride *= 2;
    }
  });

  // Guarantee the final frame is exactly the phase end.
  const last = vF[vF.length - 1];
  let same = last.length === g.length;
  if (same) for (let i = 0; i < g.length; i++) if (last[i] !== g[i]) { same = false; break; }
  if (!same) { vF.push(g.slice()); lF.push(lab.slice()); }
  return { val: vF, lab: lF };
}

// The "unsorted state of this stage" = end state of the previous op.
function phaseStartGrid(phase) {
  const j = ops.findIndex(o => o.phaseNum === phase);
  if (j > 0 && ops[j-1].gridSnapshot) return ops[j-1].gridSnapshot;
  return new Uint8Array(logicalGrid);     // phase 1, no padding → initial grid
}
function phaseStartLabels(phase) {
  const j = ops.findIndex(o => o.phaseNum === phase);
  if (j > 0 && ops[j-1].labelSnapshot) return ops[j-1].labelSnapshot;
  return initSliceLabels(logicalN);       // phase 1, no padding → initial labels
}

// Disable the editing controls (grid source / size / phase jumps) during a play
// session; the play/nav bar itself is handled by updateControls().
function setEditingDisabled(on) {
  document.getElementById('btn-reset').disabled = on;
  document.getElementById('btn-draw').disabled  = on;
  document.getElementById('grid-size').disabled = on;
  document.querySelectorAll('.size-btn, .phase-btn').forEach(b => b.disabled = on);
}

// Each logical control maps to its main button + its modal mirror.
const CTRL_IDS = {
  prev:    ['btn-prev', 'mbtn-prev'],
  next:    ['btn-step', 'mbtn-next'],
  play:    ['btn-play', 'mbtn-play'],
  playall: ['btn-play-all', 'mbtn-play-all'],
  pause:   ['btn-pause', 'mbtn-pause'],
  stop:    ['btn-stop', 'mbtn-stop'],
};
function setCtl(name, disabled) {
  for (const id of CTRL_IDS[name]) { const e = document.getElementById(id); if (e) e.disabled = disabled; }
}

// Single source of truth for the nav / playback bar (main + modal).
// prev/next are usable when idle OR paused; play/play-all only when idle;
// pause only while a session is running (and toggles its Pause/Resume label).
function updateControls() {
  const locked  = computing || drawMode;
  const idle    = !playing;
  const navOK   = !locked && (idle || paused);
  const atStart = currentPhaseNum === 0;
  const atEnd   = opIdx >= ops.length || (ops[opIdx] && ops[opIdx].type === 'done');
  const canPlay = !locked && !!ops.length && PLAYABLE.includes(currentPhaseNum);

  setCtl('prev',    !navOK || atStart);
  setCtl('next',    !navOK || atEnd);
  setCtl('play',    locked || !idle || !canPlay);
  setCtl('playall', locked || !idle || !ops.length);
  setCtl('pause',   locked || idle);
  setCtl('stop',    locked || (idle && currentPhaseNum === 0));

  const bp = document.getElementById('btn-pause');  if (bp) bp.textContent = paused ? t('btnResume') : t('btnPause');
  const mp = document.getElementById('mbtn-pause'); if (mp) mp.textContent = paused ? '▶' : '⏸';
}

// Render the current grid to the inline canvas and, if open, the zoom modal —
// so clicking to zoom never interrupts playback.
function renderPlay() {
  drawGrid();   // drawGrid itself repaints the modal when open
}

// Update the phase badge / title / description / progress dots for the current
// phase, on the main panel AND the modal label. Called every stage during
// playback so the user always sees which phase is running.
function renderPhaseInfo() {
  const p      = PHASES.find(ph => ph.num === currentPhaseNum);
  const badge  = document.getElementById('phase-badge');
  const mbadge = document.getElementById('mp-badge');
  const mtitle = document.getElementById('mp-title');

  if (!p) {
    badge.textContent = '—'; badge.className = 'phase-badge';
    document.getElementById('phase-title-text').textContent = t('ready');
    document.getElementById('phase-desc-text').textContent  = isPaddingNeeded()
      ? t('readyDescPad')(logicalN, nextValidN(logicalN))
      : t('readyDesc');
    if (mbadge) mbadge.textContent = '—';
    if (mtitle) mtitle.textContent = t('ready');
  } else {
    const sym = (p.num === 'PAD') ? 'P' : (p.num === 'UNPAD') ? 'U' : p.num;
    // Strip the leading "Φάση N — " / "Phase N — " — the badge already shows the number.
    const title = p.title[LANG].replace(/^(?:Φάση|Phase)\s+\d+\s*—\s*/, '');
    badge.textContent = sym; badge.className = 'phase-badge active';
    document.getElementById('phase-title-text').textContent = title;
    document.getElementById('phase-desc-text').textContent  = p.desc[LANG];
    if (mbadge) mbadge.textContent = sym;
    if (mtitle) mtitle.textContent = title;
  }

  const curIdx = (currentPhaseNum === 0) ? -1 : phaseIndex(currentPhaseNum);
  for (let i = 1; i <= 8; i++) {
    const dot = document.getElementById(`pdot-${i}`);
    dot.className = 'phase-dot';
    if (phaseIndex(i) < curIdx)     dot.classList.add('done');
    else if (i === currentPhaseNum) dot.classList.add('current');
  }
}

// Settle the displayed state on a stage's end snapshot.
function settleTo(stage) {
  const op = ops.find(o => o.phaseNum === stage);
  if (!op) return;
  N = op.displayN; grid = op.gridSnapshot.slice(); currentLabels = op.labelSnapshot; currentPhaseNum = stage;
  opIdx = ops.indexOf(op) + 1;
}

// Begin a play session; returns its generation token.
function startPlayback() {
  playGen++;
  playing = true; paused = false;
  setEditingDisabled(true);
  updateControls();
  return playGen;
}

function endPlayback() {
  playing = false; paused = false;
  setEditingDisabled(false);
  updateUI(); updatePhaseButtons(); drawGrid();
  if (modalOpen) sizeAndPaintModal();
}

// Invalidate any running session without settling (the caller sets next state).
function cancelPlayback() { playGen++; playing = false; paused = false; }

// Pause / resume the running session.
function togglePause() {
  if (!playing) return;
  paused = !paused;
  updateControls();
}

// Stop: end any playback and rewind to the initial grid (phase 0).
function doStop() {
  cancelPlayback();
  setEditingDisabled(false);
  jumpToPhase(0);
  if (modalOpen) sizeAndPaintModal();
}

// Animate one stage; resolves when it finishes or its generation is superseded.
// Pause freezes elapsed time without advancing the frame. Sorting phases play
// captured frames over playMsFor(); non-sort stages (PAD / phase 2 / UNPAD) hold
// briefly — phase 2 longer, to read the colour-coded unshuffle.
function animateStage(stage, gen) {
  return new Promise(resolve => {
    const endOp = ops.find(o => o.phaseNum === stage);
    if (!endOp) { resolve(); return; }
    const n = endOp.displayN;
    N = n; currentPhaseNum = stage;
    renderPhaseInfo();

    const sorting = PLAYABLE.includes(stage);
    const frames  = sorting ? capturePhaseFrames(phaseStartGrid(stage), phaseStartLabels(stage), n, stage) : null;
    if (sorting && frames.val.length < 2) { grid = endOp.gridSnapshot.slice(); currentLabels = endOp.labelSnapshot; renderPlay(); resolve(); return; }
    if (!sorting) { grid = endOp.gridSnapshot.slice(); currentLabels = endOp.labelSnapshot; renderPlay(); }

    const dur     = sorting ? playMsFor(stage) : ((stage === 2) ? 1500 : 700);
    const lastIdx = sorting ? frames.val.length - 1 : 0;
    const t0      = performance.now();
    let   last    = t0, pausedMs = 0;

    (function tick(now) {
      if (gen !== playGen) { resolve(); return; }                 // superseded
      if (paused) { pausedMs += now - last; last = now; playRAF = requestAnimationFrame(tick); return; }
      last = now;
      const p = Math.min(1, (now - t0 - pausedMs) / dur);
      if (sorting) { const i = Math.round(p * lastIdx); grid = frames.val[i]; currentLabels = frames.lab[i]; renderPlay(); }
      if (p < 1) { playRAF = requestAnimationFrame(tick); }
      else { if (sorting) { grid = endOp.gridSnapshot.slice(); currentLabels = endOp.labelSnapshot; renderPlay(); } resolve(); }
    })(t0);
  });
}

// Play the currently selected phase from the previous phase's end state.
async function playCurrentPhase() {
  const phase = currentPhaseNum;
  if (!ops.length || !PLAYABLE.includes(phase)) return;
  cancelPlayback();
  const gen = startPlayback();
  await animateStage(phase, gen);
  if (gen !== playGen) return;                 // superseded — owner stops here
  settleTo(phase);
  endPlayback();
}

// Play the entire sequence, stage by stage, start to finish.
async function playAll() {
  if (!ops.length) return;
  cancelPlayback();
  const gen = startPlayback();
  for (const stage of getPhaseOrder()) {
    await animateStage(stage, gen);
    if (gen !== playGen) return;               // superseded
  }
  const di = ops.findIndex(o => o.type === 'done');
  opIdx = di < 0 ? ops.length : di;            // rest at the fully-sorted end
  endPlayback();
}

// Previous / next phase. navOrder includes 0 (initial grid). Uses currentPhaseNum
// (always current, even mid Play-All) + jumpToPhase, so it is robust to stale
// opIdx. Cancels any running playback first.
function navOrder() { return [0, ...getPhaseOrder()]; }
function goPrev() {
  cancelPlayback();
  setEditingDisabled(false);
  const order = navOrder();
  let i = order.indexOf(currentPhaseNum); if (i < 0) i = 0;
  jumpToPhase(order[Math.max(0, i - 1)]);
}
function goNext() {
  cancelPlayback();
  setEditingDisabled(false);
  const order = navOrder();
  let i = order.indexOf(currentPhaseNum); if (i < 0) i = 0;
  if (i < order.length - 1) jumpToPhase(order[i + 1]);
  else updateControls();
}

// ---------------------------------------------------------------------------
// Potentially-dirty region per phase (0-1 grid).
// "Dirty" = mixed cells (both 0 and 1) within the structure that phase sorts.
// Returns a boolean[] of length n*n. Only phases 1,3,4,5,6,7 are annotated.
// ---------------------------------------------------------------------------
function computeDirtyCells(g, n, phase) {
  const dirty = new Array(n * n).fill(false);

  // Mark every row that is mixed within columns [c0,c1] and rows [r0,r1].
  function markMixedRows(r0, r1, c0, c1) {
    for (let r = r0; r <= r1; r++) {
      let has0 = false, has1 = false;
      for (let c = c0; c <= c1; c++) {
        if (g[r * n + c] === 0) has0 = true; else has1 = true;
      }
      if (has0 && has1)
        for (let c = c0; c <= c1; c++) dirty[r * n + c] = true;
    }
  }

  if (phase === 1 || phase === 3) {
    // Mixed rows within each block (restricted to the block's columns).
    const bs = getBlockSize(n), nb = getNumBlocks(n);
    for (let br = 0; br < nb; br++)
      for (let bc = 0; bc < nb; bc++)
        markMixedRows(br * bs, (br + 1) * bs - 1, bc * bs, (bc + 1) * bs - 1);
  } else if (phase === 4) {
    // Mixed rows across the full width.
    markMixedRows(0, n - 1, 0, n - 1);
  } else if (phase === 5 || phase === 6) {
    // Mixed rows within each vertical slice.
    const k = getNumSlices(n), sw = Math.floor(n / k);
    for (let vs = 0; vs < k; vs++)
      markMixedRows(0, n - 1, vs * sw, vs * sw + sw - 1);
  } else if (phase === 7) {
    // Contiguous global-snake segment from the first 1 to the last 0.
    const snake = getSnakeIndices(0, 0, n - 1, n - 1);
    let first1 = -1, last0 = -1;
    for (let i = 0; i < snake.length; i++) {
      const [r, c] = snake[i];
      const v = g[r * n + c];
      if (v === 1 && first1 === -1) first1 = i;
      if (v === 0) last0 = i;
    }
    if (first1 !== -1 && last0 !== -1 && first1 <= last0)
      for (let i = first1; i <= last0; i++) {
        const [r, c] = snake[i];
        dirty[r * n + c] = true;
      }
  }

  return dirty;
}

// ---------------------------------------------------------------------------
// Paint the grid onto a 2D context at a given cell size.
// Shared by the inline canvas (drawGrid) and the expand modal (openGridModal).
// cellLines: draw a 1px line between every cell (used in the modal view).
// ---------------------------------------------------------------------------
function paintGrid(c, g, n, cell, phaseNum, cellLines) {
  const size = cell * n;
  c.imageSmoothingEnabled = false;
  c.clearRect(0, 0, size, size);

  // Slice-provenance colouring: tint each white cell by the ORIGINAL vertical
  // slice it came from, tracked through every phase (currentLabels). null = off.
  const labels = (colorEnabled && currentLabels && currentLabels.length === n * n) ? currentLabels : null;

  for (let r = 0; r < n; r++)
    for (let col = 0; col < n; col++) {
      if (g[r * n + col] === 1) c.fillStyle = labels ? SLICE_COLORS[labels[r * n + col]] : '#e8eaf0';
      else                      c.fillStyle = '#0b0e14';
      c.fillRect(col * cell, r * cell, cell, cell);
    }

  // Per-cell gridlines (modal only) — drawn under the block/dirty outlines.
  if (cellLines && cell >= 3) {
    c.strokeStyle = 'rgba(124,136,153,0.45)';
    c.lineWidth   = 1;
    c.beginPath();
    for (let i = 1; i < n; i++) {
      const p = i * cell + 0.5;
      c.moveTo(p, 0); c.lineTo(p, size);
      c.moveTo(0, p); c.lineTo(size, p);
    }
    c.stroke();
    c.strokeRect(0.5, 0.5, size - 1, size - 1);
  }

  if (VALID_SIZES.includes(n)) {
    const bs   = getBlockSize(n);
    const nb   = getNumBlocks(n);
    const bpx  = bs * cell;
    const lw   = cellLines ? 2 : (n <= 16 ? 2 : 1);
    const half = lw / 2;
    c.strokeStyle = 'rgba(108,156,220,0.55)';
    c.lineWidth   = lw;
    for (let br = 0; br < nb; br++)
      for (let bc = 0; bc < nb; bc++)
        c.strokeRect(bc * bpx + half, br * bpx + half, bpx - lw, bpx - lw);
  }

  // Red outline of the potentially-dirty region — phases 1,3,4,5,6,7 only.
  // Perimeter only: an edge is drawn solely where the neighbour is not dirty,
  // so side-by-side dirty cells merge without an internal dividing line.
  if ([1, 3, 4, 5, 6, 7].includes(phaseNum)) {
    const dirty = computeDirtyCells(g, n, phaseNum);
    const isDirty = (r, col) => r >= 0 && r < n && col >= 0 && col < n && dirty[r * n + col];
    c.strokeStyle = '#e27e7e';
    c.lineWidth   = cellLines ? 2.5 : (n <= 16 ? 2.5 : 1.5);
    c.beginPath();
    for (let r = 0; r < n; r++) {
      for (let col = 0; col < n; col++) {
        if (!dirty[r * n + col]) continue;
        const x = col * cell, y = r * cell;
        if (!isDirty(r - 1, col)) { c.moveTo(x, y);            c.lineTo(x + cell, y); }
        if (!isDirty(r + 1, col)) { c.moveTo(x, y + cell);     c.lineTo(x + cell, y + cell); }
        if (!isDirty(r, col - 1)) { c.moveTo(x, y);            c.lineTo(x, y + cell); }
        if (!isDirty(r, col + 1)) { c.moveTo(x + cell, y);     c.lineTo(x + cell, y + cell); }
      }
    }
    c.stroke();
  }
}

// ---------------------------------------------------------------------------
// Draw (inline canvas) — fits the grid to ≤560px.
// ---------------------------------------------------------------------------
function drawGrid() {
  if (suppressDraw || !grid) return;

  const bound = Math.min(560, window.innerWidth - 48);
  const cell  = Math.max(1, Math.floor(bound / N));
  const size  = cell * N;
  const dpr   = window.devicePixelRatio || 1;

  if (canvas.width !== size * dpr || canvas.height !== size * dpr) {
    canvas.width  = size * dpr;
    canvas.height = size * dpr;
  }
  canvas.style.width  = size + 'px';
  canvas.style.height = size + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  paintGrid(ctx, grid, N, cell, currentPhaseNum, false);

  if (modalOpen) sizeAndPaintModal();   // keep the zoom view synced to every redraw
}

// ---------------------------------------------------------------------------
// Expand modal — render the current grid large, with per-cell gridlines.
// Cell ≥ 6px so cells and lines stay clearly visible even at n=256.
// ---------------------------------------------------------------------------
const gridModal   = document.getElementById('grid-modal');
const modalCanvas = document.getElementById('modal-canvas');

// Size the modal canvas to the current N and paint the current grid into it.
// Recomputes cell size each call so it adapts if N changes mid Play-All, and is
// re-invoked every animation frame so zooming never pauses playback.
function sizeAndPaintModal() {
  if (!grid) return;
  const maxFit = Math.min(window.innerWidth, window.innerHeight) * 0.9;
  const cell   = Math.max(6, Math.floor(maxFit / N));
  const size   = cell * N;
  const dpr    = window.devicePixelRatio || 1;
  if (modalCanvas.width !== size * dpr || modalCanvas.height !== size * dpr) {
    modalCanvas.width        = size * dpr;
    modalCanvas.height       = size * dpr;
    modalCanvas.style.width  = size + 'px';
    modalCanvas.style.height = size + 'px';
  }
  const mctx = modalCanvas.getContext('2d');
  mctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  paintGrid(mctx, grid, N, cell, currentPhaseNum, true);
}

function openGridModal() {
  if (drawMode || !grid) return;
  modalOpen = true;
  sizeAndPaintModal();
  gridModal.classList.add('open');
}

function closeGridModal() {
  modalOpen = false;
  gridModal.classList.remove('open');
}

// ---------------------------------------------------------------------------
// UI updates
// ---------------------------------------------------------------------------
function updateUI() {
  renderPhaseInfo();
  updateSizeButtons();
  updateModeButtons();
  updateControls();
  updateColorButton();
}

function updatePhaseButtons() {
  const order     = getPhaseOrder();
  const curIdx    = (currentPhaseNum === 0) ? -1 : order.indexOf(currentPhaseNum);
  const padNeeded = isPaddingNeeded();

  document.getElementById('phase-btn-pad').style.display   = padNeeded ? '' : 'none';
  document.getElementById('phase-btn-unpad').style.display = padNeeded ? '' : 'none';

  document.querySelectorAll('.phase-btn').forEach(btn => {
    const raw   = btn.dataset.phase;
    const ph    = (raw === 'PAD') ? 'PAD' : (raw === 'UNPAD') ? 'UNPAD' : parseInt(raw);
    const phIdx = (ph === 0) ? -1 : order.indexOf(ph);

    btn.className = 'phase-btn';
    btn.disabled  = false;

    if (ph === currentPhaseNum || (ph === 0 && currentPhaseNum === 0))
      btn.classList.add('active');
    else if (ph !== 0 && phIdx !== -1 && phIdx < curIdx)
      btn.classList.add('done');
  });
}

// Highlight the preset size button matching the current size (none for custom n).
function updateSizeButtons() {
  document.querySelectorAll('.size-btn').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.size) === logicalN));
  document.getElementById('grid-size').classList.toggle('active', !VALID_SIZES.includes(logicalN));
}

// Highlight the chosen grid source: Σχεδίασε while drawing, else Τυχαίο.
function updateModeButtons() {
  const drawChosen = drawMode || gridSource === 'draw';
  document.getElementById('btn-reset').classList.toggle('active', !drawChosen);
  document.getElementById('btn-draw').classList.toggle('active', drawChosen);
}

// Apply a preset size: re-blank in draw mode, else regenerate a random grid.
function applySize(n) {
  document.getElementById('grid-size').value = n;
  if (drawMode) startDraw();
  else initGrid();
}

// ---------------------------------------------------------------------------
// Slice-colour toggle + hover tooltips
// ---------------------------------------------------------------------------
function updateColorButton() {
  const b = document.getElementById('btn-color');
  if (!b) return;
  b.textContent = colorEnabled ? t('on') : t('off');
  b.classList.toggle('active', colorEnabled);
}

function toggleColor() {
  colorEnabled = !colorEnabled;
  updateColorButton();
  drawGrid();
  if (modalOpen) sizeAndPaintModal();
}

// Custom tooltips: after hovering a control for 2 s, show a short description.
let tipEl = null, tipTimer = 0;
function showTip(el) {
  if (!tipEl) return;
  tipEl.textContent = t(el.dataset.tip) || el.dataset.tip;
  tipEl.style.display = 'block';
  const r  = el.getBoundingClientRect();
  const tr = tipEl.getBoundingClientRect();
  let left = r.left + r.width / 2 - tr.width / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tr.width - 8));
  let top = r.bottom + 8;
  if (top + tr.height > window.innerHeight - 8) top = r.top - tr.height - 8;   // flip above
  tipEl.style.left = left + 'px';
  tipEl.style.top  = top  + 'px';
}
function hideTip() { if (tipEl) tipEl.style.display = 'none'; }

// Map controls → tip key (shared keys for main + modal mirror buttons).
// Play / Pause / Play-All are universal transport icons — no tooltip (logo only).
const TOOLTIP_IDS = {
  'btn-prev': 'tipPrev', 'btn-step': 'tipNext', 'btn-color': 'tipColor', 'btn-reset': 'tipRandom', 'btn-draw': 'tipDraw',
  'grid-size': 'tipSizeInput', 'btn-brush-color': 'tipBrushColor', 'brush-size': 'tipBrushSize',
  'btn-clear': 'tipClear', 'btn-finish': 'tipFinish',
  'mbtn-prev': 'tipPrev', 'mbtn-next': 'tipNext',
};
function initTooltips() {
  tipEl = document.getElementById('tooltip');
  for (const id in TOOLTIP_IDS) { const e = document.getElementById(id); if (e) e.dataset.tip = TOOLTIP_IDS[id]; }
  document.querySelectorAll('.size-btn').forEach(b => b.dataset.tip = 'tipSize');
  document.querySelectorAll('.phase-btn').forEach(b => b.dataset.tip = 'tipPhase');
  document.querySelectorAll('[data-tip]').forEach(el => {
    el.addEventListener('mouseenter', () => { clearTimeout(tipTimer); tipTimer = setTimeout(() => showTip(el), 2000); });
    el.addEventListener('mouseleave', () => { clearTimeout(tipTimer); hideTip(); });
    el.addEventListener('mousedown',  () => { clearTimeout(tipTimer); hideTip(); });
  });
}

// ---------------------------------------------------------------------------
// Guided tour (tutorial) — spotlight + popover, one feature at a time.
// ---------------------------------------------------------------------------
const TOUR = [
  { sel: '#grid-canvas',    key: 'tourGrid' },
  { sel: '#seg-size',       key: 'tourSize' },
  { sel: '#seg-values',     key: 'tourValues' },
  { sel: '#btn-color',      key: 'tourColor' },
  { sel: '.phase-jump-row', key: 'tourPhases' },
  { sel: '#btn-prev',       key: 'tourPrev' },
  { sel: '#btn-step',       key: 'tourNext' },
  { sel: '#btn-play',       key: 'tourPlay' },
  { sel: '#btn-play-all',   key: 'tourPlayAll' },
  { sel: '#btn-pause',      key: 'tourPause' },
  { sel: '#btn-stop',       key: 'tourStop' },
  { sel: '.phase-panel',    key: 'tourPanel' },
  { sel: '#lang-switch',    key: 'tourLang' },
  { sel: '#btn-tutorial',   key: 'tourTutorial' },
];
let tourIndex = -1;

function startTour() {
  tourIndex = 0;
  document.getElementById('tour-mask').classList.add('on');
  document.getElementById('tour-spotlight').style.display = 'block';
  document.getElementById('tour-popover').style.display   = 'block';
  showTourStep();
}
function endTour() {
  tourIndex = -1;
  document.getElementById('tour-mask').classList.remove('on');
  document.getElementById('tour-spotlight').style.display = 'none';
  document.getElementById('tour-popover').style.display   = 'none';
}
function tourGo(delta) {
  if (tourIndex < 0) return;
  const n = tourIndex + delta;
  if (n < 0) return;
  if (n >= TOUR.length) { endTour(); return; }   // past the last step → finish
  tourIndex = n;
  showTourStep();
}
function showTourStep() {
  const step = TOUR[tourIndex];
  const el   = document.querySelector(step.sel);

  document.getElementById('tour-text').textContent = t(step.key);
  document.getElementById('tour-step').textContent = (tourIndex + 1) + ' / ' + TOUR.length;
  document.getElementById('tour-prev').textContent = t('tourBtnBack');
  document.getElementById('tour-prev').disabled    = tourIndex === 0;
  document.getElementById('tour-next').textContent =
    (tourIndex === TOUR.length - 1) ? t('tourBtnDone') : t('tourBtnNext');

  if (!el) { endTour(); return; }
  el.scrollIntoView({ block: 'nearest', inline: 'nearest' });

  const r    = el.getBoundingClientRect();
  const pad  = 6;
  const spot = document.getElementById('tour-spotlight');
  spot.style.left   = (r.left - pad) + 'px';
  spot.style.top    = (r.top  - pad) + 'px';
  spot.style.width  = (r.width  + pad * 2) + 'px';
  spot.style.height = (r.height + pad * 2) + 'px';

  // Position the popover below the target, or above if there's no room.
  const pop = document.getElementById('tour-popover');
  const pw  = pop.offsetWidth, ph = pop.offsetHeight;
  const vw  = window.innerWidth, vh = window.innerHeight, gap = 14;
  let top  = r.bottom + gap;
  if (top + ph > vh - 8) top = r.top - ph - gap;
  top = Math.max(8, Math.min(top, vh - ph - 8));
  let left = r.left + r.width / 2 - pw / 2;
  left = Math.max(8, Math.min(left, vw - pw - 8));
  pop.style.left = left + 'px';
  pop.style.top  = top  + 'px';
}

document.getElementById('btn-tutorial').addEventListener('click', startTour);
document.getElementById('tour-prev').addEventListener('click', () => tourGo(-1));
document.getElementById('tour-next').addEventListener('click', () => tourGo(1));
document.getElementById('tour-cancel').addEventListener('click', endTour);
window.addEventListener('keydown', e => {
  if (tourIndex < 0) return;
  if (e.key === 'Escape')          endTour();
  else if (e.key === 'ArrowRight') tourGo(1);
  else if (e.key === 'ArrowLeft')  tourGo(-1);
});
window.addEventListener('resize', () => { if (tourIndex >= 0) showTourStep(); });
window.addEventListener('scroll', () => { if (tourIndex >= 0) showTourStep(); }, { passive: true });

// ---------------------------------------------------------------------------
// Event listeners
// ---------------------------------------------------------------------------
document.getElementById('btn-prev') .addEventListener('click', goPrev);
document.getElementById('btn-step') .addEventListener('click', goNext);
document.getElementById('btn-play') .addEventListener('click', playCurrentPhase);
document.getElementById('btn-play-all').addEventListener('click', playAll);
document.getElementById('btn-pause').addEventListener('click', togglePause);
document.getElementById('btn-stop').addEventListener('click', doStop);
document.getElementById('btn-color').addEventListener('click', toggleColor);

// Modal mirror buttons (prev / next / play / play-all / pause)
document.getElementById('mbtn-prev').addEventListener('click', goPrev);
document.getElementById('mbtn-next').addEventListener('click', goNext);
document.getElementById('mbtn-play').addEventListener('click', playCurrentPhase);
document.getElementById('mbtn-play-all').addEventListener('click', playAll);
document.getElementById('mbtn-pause').addEventListener('click', togglePause);
document.getElementById('mbtn-stop').addEventListener('click', doStop);
document.getElementById('btn-reset').addEventListener('click', () => { exitDrawMode(); initGrid(); });
document.getElementById('grid-size').addEventListener('change', () => { if (drawMode) startDraw(); else initGrid(); });

document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => applySize(parseInt(btn.dataset.size)));
});

// Draw-your-own-grid
document.getElementById('btn-draw').addEventListener('click', () => { if (!drawMode) startDraw(); });
document.getElementById('btn-finish').addEventListener('click', () => finishDraw());
document.getElementById('btn-brush-color').addEventListener('click', () => { drawColor = drawColor === 1 ? 0 : 1; refreshDrawLabels(); });
document.getElementById('brush-size').addEventListener('input', e => {
  brushSize = parseInt(e.target.value);
  document.getElementById('brush-size-val').textContent = brushSize;
});
document.getElementById('btn-clear').addEventListener('click', () => { if (grid) { grid.fill(0); drawGrid(); } });
canvas.addEventListener('pointerdown', e => {
  if (!drawMode) return;
  painting = true;
  try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
  paintAt(e);
  e.preventDefault();
});
canvas.addEventListener('pointermove', e => { if (drawMode && painting) { paintAt(e); e.preventDefault(); } });
const endStroke = () => { if (painting && drawMode) drawGrid(); painting = false; };
window.addEventListener('pointerup', endStroke);
window.addEventListener('pointercancel', endStroke);

document.querySelectorAll('.phase-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const raw    = btn.dataset.phase;
    const target = (raw === 'PAD') ? 'PAD' : (raw === 'UNPAD') ? 'UNPAD' : parseInt(raw);
    jumpToPhase(target);
  });
});

window.addEventListener('resize', drawGrid);

// Click-to-expand modal
canvas.addEventListener('click', openGridModal);
document.getElementById('grid-modal-close').addEventListener('click', closeGridModal);
modalCanvas.addEventListener('click', closeGridModal);
gridModal.addEventListener('click', e => { if (e.target === gridModal) closeGridModal(); });
window.addEventListener('keydown', e => { if (e.key === 'Escape') closeGridModal(); });

// Language switcher
document.querySelectorAll('.lang-opt').forEach(b => {
  b.addEventListener('click', () => {
    if (b.dataset.lang === LANG) return;
    LANG = b.dataset.lang;
    localStorage.setItem('lang', LANG);
    applyLang();
    updateUI();
  });
});

// ---------------------------------------------------------------------------
// Boot: apply language, init worker pool, then first grid
// ---------------------------------------------------------------------------
applyLang();
updateColorButton();
initTooltips();
initWorkerPool().then(() => initGrid());
</script>
